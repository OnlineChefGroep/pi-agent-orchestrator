project: pi-subagents
imagemagick: true

environments:
  development:
    url: local
    description: Local development environment - test from working directory

  published:
    url: npm://@onlinechef/pi-subagents
    description: Latest published version from GitHub npm registry

default_target: development

auth:
  method: none
  provider: none

personas:
  - name: default_user
    description: 'Standard extension user with default configurations'
    test_focus:
      - agent spawning
      - result retrieval
      - default agent types
    cannot_do: []

apps:
  cli:
    path_patterns:
      - 'src/**/*.ts'
      - 'test/**/*.ts'
      - 'package.json'
      - 'tsconfig.json'
    skill: qa-cli
    test_tool: tuistory
    build_command: 'npm run build'

feature_flags:
  provider: none

integrations: {}

cleanup:
  auto_cleanup: true
  strategy: script
  instructions: 'Run npm run test:cleanup to remove any test-generated artifacts, temporary files, or mock agents'

failure_learning: suggest_in_report
