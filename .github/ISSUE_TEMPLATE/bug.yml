name: Bug report
description: Report something that is broken in pi-agent-orchestrator.
title: "[bug] "
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      placeholder: A short, factual description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v0.17.1 (or commit hash)
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context (OS, Node, Pi host version)
      placeholder: e.g. macOS 14, Node 22.3, pi-coding-agent 0.78
