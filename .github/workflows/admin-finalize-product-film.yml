name: One-shot product-film cleanup

on:
  push:
    branches: [feat/remotion-product-film]
    paths:
      - '.github/workflows/admin-finalize-product-film.yml'

permissions:
  contents: write

concurrency:
  group: one-shot-product-film-cleanup
  cancel-in-progress: false

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout product-film branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: feat/remotion-product-film
          fetch-depth: 0

      - name: Use composition FPS for CTA animation
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("showcase/remotion/src/ProductFilm.tsx")
          source = path.read_text()
          old = '''const OutcomeScene = ({version, repository}: {version: string; repository: string}) => {
            const frame = useCurrentFrame();
            const verified = frame > 94;
            const cta = spring({frame: frame - 170, fps: 30, config: {damping: 18, stiffness: 100}});'''
          new = '''const OutcomeScene = ({version, repository}: {version: string; repository: string}) => {
            const frame = useCurrentFrame();
            const {fps} = useVideoConfig();
            const verified = frame > 94;
            const cta = spring({frame: frame - 170, fps, config: {damping: 18, stiffness: 100}});'''
          if source.count(old) != 1:
              raise SystemExit("Expected OutcomeScene source was not found exactly once")
          path.write_text(source.replace(old, new, 1))
          PY

      - name: Commit cleanup and remove one-shot workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/admin-finalize-product-film.yml
          git add showcase/remotion/src/ProductFilm.tsx
          git diff --cached --check
          git commit -m "fix(showcase): use composition fps for CTA"
          git push origin HEAD:feat/remotion-product-film
