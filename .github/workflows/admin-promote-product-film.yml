name: Promote Verified Product Film

on:
  push:
    branches: [feat/remotion-product-film]
    paths:
      - '.github/workflows/admin-promote-product-film.yml'

permissions:
  actions: read
  contents: write

concurrency:
  group: promote-verified-product-film
  cancel-in-progress: true

jobs:
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout latest release branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: feat/remotion-product-film
          fetch-depth: 0

      - name: Make future motion timing frame-rate aware
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('showcase/remotion/src/ProductFilm.tsx')
          source = path.read_text()
          if 'fps: 30' in source:
              anchor = 'const OutcomeScene = ({version, repository}: {version: string; repository: string}) => {\n  const frame = useCurrentFrame();\n'
              if anchor not in source:
                  raise SystemExit('OutcomeScene anchor was not found')
              source = source.replace(anchor, anchor + '  const {fps} = useVideoConfig();\n', 1)
              source = source.replace('fps: 30', 'fps', 1)
              path.write_text(source)
          elif 'const {fps} = useVideoConfig();' not in source:
              raise SystemExit('OutcomeScene is neither old nor already corrected')
          PY

      - name: Download previously verified Remotion artifact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .release-artifact
          curl --fail --location \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/8493325083/zip" \
            --output .release-artifact/showcase.zip
          unzip -q .release-artifact/showcase.zip -d .release-artifact/unpacked
          candidate="$(find .release-artifact/unpacked -type f -name product_film.mp4 -print -quit)"
          test -n "${candidate}"
          mkdir -p docs/images
          cp "${candidate}" docs/images/product_film.mp4

      - name: Verify exact production asset
        shell: bash
        run: |
          node scripts/verify-product-film.mjs docs/images/product_film.mp4
          test "$(stat -c '%s' docs/images/product_film.mp4)" -eq 6083668
          echo '8aa79db8f8136809c3a77433eff9f1940df250c33f5f7ea06c00d124d858ba38  docs/images/product_film.mp4' | sha256sum --check

      - name: Commit asset and remove one-shot workflow
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm .github/workflows/admin-promote-product-film.yml
          git config user.name 'OnlineChef Release Bot'
          git config user.email 'release-bot@users.noreply.github.com'
          git add showcase/remotion/src/ProductFilm.tsx docs/images/product_film.mp4
          git add -u .github/workflows/admin-promote-product-film.yml
          git commit -m 'fix(showcase): publish verified product film asset'
          git fetch origin feat/remotion-product-film
          git rebase origin/feat/remotion-product-film
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:feat/remotion-product-film
