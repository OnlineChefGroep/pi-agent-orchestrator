name: GitHub to Linear Sync

on:
  issues:
    types: [opened, edited, labeled, unlabeled, reopened, closed, assigned, unassigned]
  # This privileged trigger is required for fork PR metadata and repository secrets.
  # The job checks out only the trusted default branch and never executes fork code.
  pull_request_target: # zizmor: ignore[dangerous-triggers]
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review
      - converted_to_draft
      - closed
      - labeled
      - unlabeled

permissions:
  contents: read

concurrency:
  group: linear-sync-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  sync:
    name: Sync GitHub item to Linear
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout trusted default branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Sync issue or pull request
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LINEAR_PARENT_ISSUE: CHEF-31
        run: node scripts/linear-github-sync.mjs
