name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ts:
    name: TypeScript (${{ matrix.peer-deps }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        peer-deps: [lowest, latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          if [ "${{ matrix.peer-deps }}" = "lowest" ]; then
            # Pin to minimum supported peer dep versions
            npm install --legacy-peer-deps \
              @mariozechner/pi-ai@0.70.5 \
              @mariozechner/pi-coding-agent@0.70.5 \
              @mariozechner/pi-tui@0.70.5
          else
            npm ci
          fi

      - run: npm run typecheck

      - run: npm run lint

      - run: npm test
