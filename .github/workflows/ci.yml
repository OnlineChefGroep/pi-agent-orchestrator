name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.19
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify frozen release policy
        run: npm run verify:release-policy

      - name: Verify package version transition
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        env:
          CURRENT_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          git fetch origin main
          node scripts/verify-version-transition.mjs origin/main HEAD "$CURRENT_BRANCH"

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        id: lint
        shell: bash
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee biome.log

      - name: Upload Biome diagnostics
        if: failure() && steps.lint.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: biome-diagnostics-${{ github.run_id }}
          path: biome.log
          retention-days: 14

      - name: Build
        run: npm run build

      - name: Verify Pi package metadata
        run: npm run verify:package

      - name: Test
        id: tests
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee test.log

      - name: Upload quality test diagnostics
        if: failure() && steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: quality-test-diagnostics-${{ github.run_id }}
          path: test.log
          retention-days: 14

      - name: Verify npm package contents
        shell: bash
        run: |
          set -euo pipefail
          npm pack --dry-run --json > npm-pack.json
          node scripts/verify-npm-pack.mjs npm-pack.json

  compatibility:
    name: Compatibility (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: 24
          - os: windows-latest
            node: 22
          - os: windows-latest
            node: 24
          - os: macos-latest
            node: 22
          - os: macos-latest
            node: 24
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        id: tests
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee test.log

      - name: Upload compatibility test diagnostics
        if: failure() && steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: compatibility-${{ matrix.os }}-node-${{ matrix.node }}-${{ github.run_id }}
          path: test.log
          retention-days: 14

  lowest-peer-dependencies:
    name: Lowest supported peer dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.19
          cache: npm

      - name: Install lowest supported peer dependencies
        run: |
          npm ci
          npm install --no-save --package-lock=false --include=dev \
            @earendil-works/pi-ai@0.80.10 \
            @earendil-works/pi-coding-agent@0.80.10
          npm ls @earendil-works/pi-ai @earendil-works/pi-coding-agent

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        id: tests
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee test.log

      - name: Upload lowest-peer test diagnostics
        if: failure() && steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lowest-peer-test-diagnostics-${{ github.run_id }}
          path: test.log
          retention-days: 14

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high

  benchmarks:
    name: Render benchmarks
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.19
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run benchmarks and evaluate thresholds
        run: node scripts/check-benchmark-thresholds.mjs

  required-gate:
    name: Required CI gate
    if: always()
    needs:
      - quality
      - compatibility
      - lowest-peer-dependencies
      - dependency-review
      - benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify required jobs
        env:
          QUALITY_RESULT: ${{ needs.quality.result }}
          COMPATIBILITY_RESULT: ${{ needs.compatibility.result }}
          LOWEST_PEER_RESULT: ${{ needs.lowest-peer-dependencies.result }}
          DEPENDENCY_REVIEW_RESULT: ${{ needs.dependency-review.result }}
          BENCHMARKS_RESULT: ${{ needs.benchmarks.result }}
        run: |
          test "$QUALITY_RESULT" = "success"
          test "$COMPATIBILITY_RESULT" = "success"
          test "$LOWEST_PEER_RESULT" = "success"
          test "$DEPENDENCY_REVIEW_RESULT" = "success" -o "$DEPENDENCY_REVIEW_RESULT" = "skipped"
          test "$BENCHMARKS_RESULT" = "success"
