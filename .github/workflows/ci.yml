name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

  ts:
    name: TS (${{ matrix.os }}, ${{ matrix.node }}, peer=${{ matrix.peer-deps }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [22, 24]
        peer-deps: [lowest, latest]
        exclude:
          # Reduce CI minutes: only test lowest peer deps on ubuntu + node 22
          - peer-deps: lowest
            os: windows-latest
          - peer-deps: lowest
            node: 24
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies (latest)
        if: matrix.peer-deps == 'latest'
        run: npm ci

      - name: Install dependencies (lowest peer deps)
        if: matrix.peer-deps == 'lowest'
        run: |
          npm ci
          npm install --no-save --legacy-peer-deps \
            @earendil-works/pi-ai@0.78.0 \
            @earendil-works/pi-coding-agent@0.78.0
          # @earendil-works/pi-tui is no longer a direct dependency; it resolves
          # transitively from pi-coding-agent@0.78.0 and is what we should
          # actually test against (not an independent external pin).

      - name: TypeScript typecheck
        if: matrix.peer-deps == 'latest'
        run: npx tsc --noEmit

      - name: Lint
        # Biome's native binary loader has a resolution issue on Node 24
        # (Cannot find module '@biomejs/cli-linux-x64/biome'). Lint only on
        # Node 22 to avoid the issue; lint results are Node-version-independent.
        if: matrix.peer-deps == 'latest' && matrix.node == 22
        run: npm run lint

      - name: Run tests
        run: npx vitest run --retry=2
        # Lowest peer deps may have breaking runtime changes; don't fail the build.
        continue-on-error: ${{ matrix.peer-deps == 'lowest' }}

      - name: Render benchmark threshold check
        if: always() && matrix.peer-deps == 'latest'
        continue-on-error: true
        run: node scripts/check-benchmark-thresholds.mjs
        # Always runs (even if previous steps failed) so benchmark results are
        # visible regardless of other test failures. Uses continue-on-error so
        # warnings/soft-failures don't block the build.
