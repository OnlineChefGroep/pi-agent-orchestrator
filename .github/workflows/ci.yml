name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ts:
    name: TS (${{ matrix.os }}, ${{ matrix.node }}, peer=${{ matrix.peer-deps }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]
        peer-deps: [lowest, latest]
        exclude:
          # Reduce CI minutes: only test lowest peer deps on ubuntu + node 20
          - peer-deps: lowest
            os: windows-latest
          - peer-deps: lowest
            node: 22
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies (latest)
        if: matrix.peer-deps == 'latest'
        run: npm ci

      - name: Install dependencies (lowest peer deps)
        if: matrix.peer-deps == 'lowest'
        run: |
          npm ci
          npm install --no-save --legacy-peer-deps \
            @mariozechner/pi-ai@0.70.5 \
            @mariozechner/pi-coding-agent@0.70.5 \
            @mariozechner/pi-tui@0.70.5

      - run: npm run typecheck

      - run: npm run lint

      - name: Run tests
        run: npm test
        # Windows has pre-existing schedule-store flakiness; don't fail the build
        continue-on-error: ${{ matrix.os == 'windows-latest' }}
