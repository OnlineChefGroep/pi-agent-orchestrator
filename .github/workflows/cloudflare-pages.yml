---
name: Deploy Cloudflare Pages

# Deploy immediately for production-site changes, with a daily reconciliation
# run and manual fallback.
# Required environment secrets: CLOUDFLARE_API_TOKEN and
# CLOUDFLARE_ACCOUNT_ID.
on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'docs/**'
      - 'scripts/build-site.sh'
      - 'sitemap.xml'
      - 'robots.txt'
      - 'agent-permissions.json'
      - '.github/workflows/cloudflare-pages.yml'
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: cloudflare-pages
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          # zizmor cache-poisoning: never cache in a publish/deploy workflow
          package-manager-cache: false

      - name: Assemble static site
        run: bash scripts/build-site.sh _site

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy _site
            --project-name=pi-agent-orchestrator
            --branch=main
