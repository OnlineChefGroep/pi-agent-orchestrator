name: CodeQL

# DISABLED auto-triggers: CodeQL requires GitHub Advanced Security / code scanning
# enabled in repository settings. Without it, the analyze step fails with:
#   "Code Security must be enabled for this repository to use code scanning."
# Re-enable push/pull_request/schedule once enabled at:
#   https://github.com/OnlineChefGroep/pi-agent-orchestrator/settings/security_analysis
on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'
