name: CodeQL

# NOTE: Auto-triggers require GitHub Advanced Security / code scanning
# enabled in repository settings. Without it, the analyze step fails.
# Enable at: https://github.com/OnlineChefGroep/pi-agent-orchestrator/settings/security_analysis
# Once enabled, uncomment the pull_request trigger below.
on:
  workflow_dispatch:
  # pull_request:
  #   branches: [main]

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'
