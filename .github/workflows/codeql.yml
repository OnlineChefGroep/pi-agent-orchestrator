name: "CodeQL"
# DISABLED: CodeQL requires "GitHub Advanced Security / Code scanning" enabled
# in repository settings. Without it, the analyze step fails with:
#   "Code Security must be enabled for this repository to use code scanning."
# Re-enable push/pull_request triggers once enabled at:
#   https://github.com/OnlineChefGroep/pi-subagents-fork/settings/security_analysis
on:
  workflow_dispatch:
jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript' ]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
    - name: Autobuild
      uses: github/codeql-action/autobuild@v4
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
