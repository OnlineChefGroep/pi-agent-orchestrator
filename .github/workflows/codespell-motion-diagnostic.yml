name: Motion codespell diagnostic

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/codespell-motion-diagnostic.yml

permissions:
  contents: read

jobs:
  codespell:
    if: github.head_ref == 'feat/motion-system-v2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: python -m pip install codespell==2.4.2
      - name: Capture codespell findings
        shell: bash
        run: |
          set +e
          codespell \
            docs/motion-profiles.md \
            src/ui/agent-top-renderer.ts \
            src/ui/agent-widget-renderer.ts \
            src/ui/agent-widget.ts \
            src/ui/animation.ts \
            src/ui/dashboard/helpers.ts \
            src/ui/settings-menu.ts \
            test/agent-widget.test.ts \
            test/animation-profiles.test.ts \
            test/dashboard-v2-rendering.test.ts \
            test/motion-profiles.test.ts \
            test/widget-motion-parity.test.ts \
            > /tmp/codespell.txt 2>&1
          echo "$?" > /tmp/codespell-status
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: motion-codespell-report
          path: |
            /tmp/codespell.txt
            /tmp/codespell-status
          retention-days: 1
      - name: Preserve conclusion
        run: exit "$(cat /tmp/codespell-status)"
