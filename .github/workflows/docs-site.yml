name: Docs & Agent-Ready Pages (Open Source)

# Assembles/verifies the OSS docs site. GitHub Pages deploy is owned solely by
# .github/workflows/pages.yml (post #264).

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "site/**"
      - "llms.txt"
      - "llms-full.txt"
      - "README.md"
      - "AGENTS.md"
      - "CHANGELOG.md"
      - "scripts/build-site.sh"
      - ".github/workflows/docs-site.yml"
  pull_request:
    paths:
      - "docs/**"
      - "site/**"
      - "llms.txt"
      - "llms-full.txt"
      - "README.md"
      - "AGENTS.md"
      - "CHANGELOG.md"
      - "scripts/build-site.sh"
      - ".github/workflows/docs-site.yml"
  workflow_dispatch:

permissions: {}

concurrency:
  group: docs-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Assemble static site (verify; deploy is pages.yml)
        run: bash scripts/build-site.sh _site
      - name: Upload assembled site artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docs-site
          path: _site
