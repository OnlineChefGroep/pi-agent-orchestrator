name: Showcase and Agent-Ready Pages

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - "showcase/**"
      - "site/**"
      - "docs/**"
      - "README.md"
      - "AGENTS.md"
      - "llms.txt"
      - "llms-full.txt"
      - "sitemap.md"
      - "sitemap.xml"
      - "robots.txt"
      - "agent-permissions.json"
      - ".github/workflows/droid-wiki-refresh.yml"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install project dependencies
        run: npm ci

      - name: Render real TUI showcase
        run: npm run showcase:remotion

      - name: Assemble static site
        run: |
          rm -rf _site
          mkdir -p _site/assets _site/docs _site/.well-known
          cp site/index.html _site/index.html
          cp site/index.md _site/index.md
          cp README.md AGENTS.md CHANGELOG.md _site/
          cp llms.txt llms-full.txt sitemap.md sitemap.xml robots.txt agent-permissions.json _site/
          cp -r docs/* _site/docs/
          cp docs/images/dashboard_preview.mp4 _site/assets/dashboard_preview.mp4
          cp docs/images/dashboard_preview.png _site/assets/dashboard_preview.png
          cp agent-permissions.json _site/.well-known/agent-permissions.json
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
