# Regenerates showcase media and verifies the static site assembles.
# GitHub Pages deploy is owned solely by .github/workflows/pages.yml.
name: Showcase and Agent-Ready Pages

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - "showcase/**"
      - "site/**"
      - "docs/**"
      - "README.md"
      - "AGENTS.md"
      - "llms.txt"
      - "llms-full.txt"
      - "sitemap.md"
      - "sitemap.xml"
      - "robots.txt"
      - "agent-permissions.json"
      - ".github/workflows/droid-wiki-refresh.yml"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions: {}

concurrency:
  group: droid-wiki-refresh-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-showcase:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install project dependencies
        run: npm ci

      - name: Render real TUI showcase
        run: npm run showcase:remotion

      - name: Assemble static site (verify; deploy is pages.yml)
        run: bash scripts/build-site.sh _site

      - name: Upload assembled site artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: site-preview
          path: _site
          retention-days: 7
