name: Wiki (RepoWiki → Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate-wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install RepoWiki
        run: pip install repowiki

      - name: Generate wiki
        run: |
          repowiki scan . \
            --format html \
            --output wiki-out/index.html \
            --model "${REPOWIKI_MODEL:-openai/gpt-4o-mini}"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Add existing docs
        run: |
          mkdir -p wiki-out/docs
          cp -r docs/* wiki-out/docs/ 2>/dev/null || true
          cp README.md wiki_out/README.md 2>/dev/null || true
          cp CHANGELOG.md wiki_out/CHANGELOG.md 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: wiki-out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
