name: Finalize motion system v2

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/scripts/finalize-motion-v2.py
      - .github/workflows/finalize-motion-v2.yml

permissions:
  contents: write

jobs:
  finalize-and-validate:
    if: github.head_ref == 'feat/motion-system-v2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/motion-system-v2
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: python .github/scripts/finalize-motion-v2.py
      - run: npm ci
      - name: Format and lint changed tests
        run: npx biome check --write test/agent-widget.test.ts test/dashboard-v2-rendering.test.ts
      - name: Typecheck
        run: npm run typecheck
      - name: Run full test suite
        run: npm test
      - name: Commit final contract alignment
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/scripts/finalize-motion-v2.py
          git rm .github/workflows/finalize-motion-v2.yml
          git rm .github/workflows/full-suite-failure-diagnostic.yml
          git add src test docs/motion-profiles.md
          git commit -m "test(ui): align motion cadence contracts"
          git push origin HEAD:feat/motion-system-v2
