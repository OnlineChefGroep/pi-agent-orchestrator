name: Fix motion review findings

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/scripts/fix-motion-review.py
      - .github/workflows/fix-motion-review.yml

permissions:
  contents: write

jobs:
  fix-and-validate:
    if: github.head_ref == 'feat/motion-system-v2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/motion-system-v2
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: python .github/scripts/fix-motion-review.py
      - run: npm ci
      - name: Format and lint changed files
        shell: bash
        run: |
          set +e
          npx biome check --write src/ui/animation.ts src/ui/agent-top-renderer.ts test/motion-profiles.test.ts > /tmp/biome.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 120 /tmp/biome.log
            exit "$status"
          fi
      - name: Validate types
        run: npm run typecheck
      - name: Run targeted motion tests
        run: npx vitest run test/motion-profiles.test.ts test/animation-profiles.test.ts test/dashboard-v2-rendering.test.ts test/widget-motion-parity.test.ts
      - name: Run full test suite
        run: npm test
      - name: Commit review fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/scripts/fix-motion-review.py
          git rm .github/workflows/fix-motion-review.yml
          git add src/ui/animation.ts src/ui/agent-top-renderer.ts test/motion-profiles.test.ts
          git commit -m "fix(ui): resolve semantic motion review findings"
          git push origin HEAD:feat/motion-system-v2
