name: Full suite failure diagnostic

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/full-suite-failure-diagnostic.yml

permissions:
  contents: read

jobs:
  ubuntu-node-24:
    if: github.head_ref == 'feat/motion-system-v2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Run full suite and capture report
        shell: bash
        run: |
          set +e
          npx vitest run --reporter=json --outputFile=/tmp/vitest.json > /tmp/vitest-runner.log 2>&1
          echo "$?" > /tmp/vitest-status
          test -f /tmp/vitest.json || cp /tmp/vitest-runner.log /tmp/vitest.json
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-suite-node24-report
          path: |
            /tmp/vitest.json
            /tmp/vitest-runner.log
            /tmp/vitest-status
          retention-days: 1
      - name: Preserve test conclusion
        shell: bash
        run: exit "$(cat /tmp/vitest-status)"
