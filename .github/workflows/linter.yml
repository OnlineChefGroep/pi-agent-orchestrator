name: Super-Linter

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: super-linter-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  super-lint:
    name: Lint Code Base
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      # Super-Linter publishes the check result while only reading repository data.
      contents: read
      statuses: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Lint Code Base
        uses: super-linter/super-linter@4ce20838b8ab83717e78138c5b3a1407148e0918 # v8.7.0
        env:
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Biome and repository-specific checks own these surfaces.
          VALIDATE_MARKDOWN: false
          VALIDATE_MARKDOWN_PRETTIER: false
          VALIDATE_NATURAL_LANGUAGE: false
          VALIDATE_CHECKOV: false
          VALIDATE_GITHUB_ACTIONS: false
          VALIDATE_JSCPD: false
          VALIDATE_TYPESCRIPT_PRETTIER: false
          VALIDATE_TYPESCRIPT_STANDARD: false
          VALIDATE_YAML_PRETTIER: false
