name: Motion Node 24 diagnostic

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/motion-node24-diagnostic.yml

permissions:
  contents: read

jobs:
  motion-node-24:
    if: github.head_ref == 'feat/motion-system-v2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Typecheck motion implementation
        run: npm run typecheck
      - name: Run motion tests
        run: npx vitest run test/motion-profiles.test.ts test/animation-profiles.test.ts test/widget-motion-parity.test.ts
