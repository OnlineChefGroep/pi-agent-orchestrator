name: One-shot dependency remediation

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: one-shot-dependency-remediation
  cancel-in-progress: false

jobs:
  remediate:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout remediation branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.19
          cache: npm

      - name: Add exact transitive overrides
        run: |
          npm pkg set overrides.brace-expansion=5.0.7
          npm pkg set overrides.protobufjs=7.6.5

      - name: Regenerate lockfile with npm
        id: lockfile
        shell: bash
        run: |
          set -o pipefail
          npm install --package-lock-only --ignore-scripts 2>&1 | tee npm-remediation.log

      - name: Upload npm remediation diagnostics
        if: failure() && steps.lockfile.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-remediation-${{ github.run_id }}
          path: npm-remediation.log
          retention-days: 14

      - name: Validate clean install
        run: npm ci --ignore-scripts

      - name: Validate vulnerable versions are absent
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs";

          const lock = JSON.parse(fs.readFileSync("package-lock.json", "utf8"));
          const packages = Object.values(lock.packages ?? {});
          const vulnerable = packages.filter((pkg) =>
            pkg && (
              pkg.version === "5.0.6" && pkg.resolved?.includes("brace-expansion") ||
              pkg.version === "7.6.4" && pkg.resolved?.includes("protobufjs")
            )
          );
          if (vulnerable.length > 0) {
            throw new Error(`Vulnerable lockfile entries remain: ${JSON.stringify(vulnerable)}`);
          }
          NODE

      - name: Commit generated lockfile remediation
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/one-shot-dependency-remediation.yml
          git add package.json package-lock.json
          git diff --cached --check
          git commit -m "fix(deps): patch vulnerable transitive dependencies"
          git push origin "HEAD:${HEAD_BRANCH}"
