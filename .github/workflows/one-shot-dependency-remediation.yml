name: One-shot dependency remediation

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: one-shot-dependency-remediation
  cancel-in-progress: false

jobs:
  remediate:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout remediation branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.19
          cache: npm

      - name: Separate runtime peers from development fixtures
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs";

          const path = "package.json";
          const pkg = JSON.parse(fs.readFileSync(path, "utf8"));
          delete pkg.overrides;

          pkg.peerDependenciesMeta = {
            ...pkg.peerDependenciesMeta,
            "@earendil-works/pi-ai": { optional: true },
            "@earendil-works/pi-coding-agent": { optional: true },
          };

          pkg.devDependencies = Object.fromEntries(
            Object.entries({
              ...pkg.devDependencies,
              "@earendil-works/pi-ai": "0.80.10",
              "@earendil-works/pi-coding-agent": "0.80.10",
            }).sort(([left], [right]) => left.localeCompare(right)),
          );

          fs.writeFileSync(path, `${JSON.stringify(pkg, null, 2)}\n`);
          NODE

      - name: Regenerate lockfile with npm
        id: lockfile
        shell: bash
        run: |
          set -o pipefail
          npm install --package-lock-only --ignore-scripts 2>&1 | tee npm-remediation.log

      - name: Upload npm remediation diagnostics
        if: failure() && steps.lockfile.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-remediation-${{ github.run_id }}
          path: npm-remediation.log
          retention-days: 14

      - name: Validate clean development install
        run: npm ci --ignore-scripts

      - name: Validate dependency classification
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs";

          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const lock = JSON.parse(fs.readFileSync("package-lock.json", "utf8"));
          const hostPaths = [
            "node_modules/@earendil-works/pi-ai",
            "node_modules/@earendil-works/pi-coding-agent",
          ];

          for (const name of ["@earendil-works/pi-ai", "@earendil-works/pi-coding-agent"]) {
            if (pkg.peerDependenciesMeta?.[name]?.optional !== true) {
              throw new Error(`${name} must remain an optional runtime peer`);
            }
            if (pkg.devDependencies?.[name] !== "0.80.10") {
              throw new Error(`${name} must be pinned as an exact development fixture`);
            }
          }

          for (const path of hostPaths) {
            const entry = lock.packages?.[path];
            if (!entry || entry.dev !== true || entry.peer === true) {
              throw new Error(`${path} is not classified as development-only`);
            }
          }

          const runtimeVulnerable = Object.entries(lock.packages ?? {}).filter(([, entry]) =>
            entry && entry.dev !== true && (
              entry.version === "5.0.6" && entry.resolved?.includes("brace-expansion") ||
              entry.version === "7.6.4" && entry.resolved?.includes("protobufjs")
            )
          );
          if (runtimeVulnerable.length > 0) {
            throw new Error(`Runtime vulnerability entries remain: ${JSON.stringify(runtimeVulnerable)}`);
          }
          NODE

      - name: Verify clean consumer install excludes Pi host packages
        shell: bash
        run: |
          set -euo pipefail
          package_file="$(npm pack --silent)"
          package_path="$PWD/$package_file"
          install_dir="$(mktemp -d)"
          cd "$install_dir"
          npm init --yes >/dev/null
          npm install --ignore-scripts "$package_path" >/dev/null
          npm ls --all --json > dependency-tree.json

          node --input-type=module <<'NODE'
          import fs from "node:fs";

          const tree = JSON.parse(fs.readFileSync("dependency-tree.json", "utf8"));
          const forbidden = new Set([
            "@earendil-works/pi-ai",
            "@earendil-works/pi-coding-agent",
          ]);

          function visit(node) {
            for (const [name, child] of Object.entries(node.dependencies ?? {})) {
              if (forbidden.has(name)) {
                throw new Error(`Clean consumer install unexpectedly includes ${name}`);
              }
              visit(child);
            }
          }

          visit(tree);
          NODE

      - name: Commit generated dependency boundary fix
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/one-shot-dependency-remediation.yml
          git add package.json package-lock.json
          git diff --cached --check
          git commit -m "fix(pkg): keep Pi host packages out of installs"
          git push origin "HEAD:${HEAD_BRANCH}"
