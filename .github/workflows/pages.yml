# Publish the project landing page (site/) to GitHub Pages.
# Target URL: https://onlinechefgroep.github.io/pi-agent-orchestrator/
#
# The site uses relative asset paths, so it works correctly under the
# /pi-agent-orchestrator/ base path without a build step or path rewriting.
# scripts/build-site.sh stages a self-contained directory of only the files
# the published page references (landing page + linked docs + showcase assets).
#
# This is the sole workflow that deploys to GitHub Pages.
#
# One-time repo setup (cannot be done with GITHUB_TOKEN):
#   gh api -X POST repos/OWNER/REPO/pages \
#     -f build_type=workflow -f 'source[branch]=main' -f 'source[path]=/'
# After that, configure-pages only reads site metadata; it does not need
# enablement (which requires a PAT/App with administration:write).
name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'docs/**'
      - 'scripts/build-site.sh'
      - 'sitemap.xml'
      - 'robots.txt'
      - 'agent-permissions.json'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Deny by default; each job grants only what it needs.
permissions: {}

# Allow only one concurrent Pages deployment; do not cancel an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # Production publish is main-only (matches Cloudflare Pages deploy guard).
    # workflow_dispatch on other refs must not stage/enable production Pages.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Assemble publish directory
        env:
          SITE_BASE: /pi-agent-orchestrator/
        run: bash scripts/build-site.sh _site
      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site
          # build-site.sh writes .nojekyll and .well-known/agent-permissions.json
          # to _site. v5 excludes dotfiles by default; without this the agent
          # discovery endpoint would 404 in production and Jekyll would take
          # over the Pages site.
          include-hidden-files: true

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
