# Publish the project landing page (site/) to GitHub Pages.
# Target URL: https://onlinechefgroep.github.io/pi-agent-orchestrator/
#
# The site uses relative asset paths, so it works correctly under the
# /pi-agent-orchestrator/ base path without a build step or path rewriting.
# scripts/build-site.sh stages a self-contained directory of only the files
# the published page references (landing page + linked docs + showcase assets).
name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'docs/images/dashboard_preview.gif'
      - 'docs/images/dashboard_preview.mp4'
      - 'docs/architecture.md'
      - 'docs/api-reference.md'
      - 'README.md'
      - 'AGENTS.md'
      - 'llms.txt'
      - 'llms-full.txt'
      - 'scripts/build-site.sh'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent Pages deployment; do not cancel an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Assemble publish directory
        run: bash scripts/build-site.sh _site
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
