name: Prepare Release 0.18.0

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: "This creates the reviewed v0.18.0 release PR. Select the exact release action."
        required: true
        type: choice
        default: CANCEL
        options:
          - CANCEL
          - RELEASE 0.18.0

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: prepare-release-0.18.0
  cancel-in-progress: false

jobs:
  prepare:
    if: ${{ inputs.confirmation == 'RELEASE 0.18.0' }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      RELEASE_VERSION: 0.18.0
      RELEASE_BRANCH: release/v0.18.0
      RELEASE_TITLE: "chore(release): v0.18.0"
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.19
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Refuse stale, duplicate, or non-main preparation
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REF" = "refs/heads/main" || {
            echo "Run this workflow from the main branch." >&2
            exit 1
          }
          git fetch origin main --tags
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)" || {
            echo "The selected main ref is stale. Re-run from the current main branch." >&2
            exit 1
          }
          if git ls-remote --exit-code --heads origin "$RELEASE_BRANCH" >/dev/null 2>&1; then
            echo "Release branch $RELEASE_BRANCH already exists; inspect or remove it before retrying." >&2
            exit 1
          fi
          if git rev-parse "v$RELEASE_VERSION" >/dev/null 2>&1; then
            echo "Tag v$RELEASE_VERSION already exists." >&2
            exit 1
          fi
          PACKAGE="@onlinechefgroep/pi-agent-orchestrator"
          # Exact version existence via shared helper — never the floating `latest` dist-tag.
          node scripts/release-recovery.mjs assert-absent "$PACKAGE" "$RELEASE_VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Verify frozen release policy
        run: |
          npm run verify:release-policy
          node scripts/release-policy.mjs candidate "$RELEASE_VERSION"

      - name: Prepare source version and changelog
        run: node scripts/prepare-release.mjs "$RELEASE_VERSION" "$(date -u +%F)"

      - name: Run complete release candidate gate
        run: |
          npm run verify:release-policy
          npm run build
          npm run typecheck
          npm run lint
          npm test
          npm run verify:package
          npm pack --dry-run --json > npm-pack.json
          node scripts/verify-npm-pack.mjs npm-pack.json

      - name: Verify release diff is minimal
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          ACTUAL="$(git diff --name-only | sort)"
          EXPECTED="$(printf '%s\n' CHANGELOG.md package-lock.json package.json | sort)"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "Release preparation changed unexpected files:" >&2
            printf '%s\n' "$ACTUAL" >&2
            exit 1
          fi

      - name: Create and semantically verify release commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$RELEASE_BRANCH"
          git add CHANGELOG.md package.json package-lock.json
          git commit -m "$RELEASE_TITLE"
          node scripts/verify-release-transaction.mjs HEAD^ HEAD "$RELEASE_VERSION"
          git push origin "HEAD:$RELEASE_BRANCH"

      - name: Open reviewed release PR
        id: pr
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cat > release-pr.md <<'EOF'
          ## Release transaction

          This PR was generated by the guarded **Prepare Release 0.18.0** workflow.

          - Updates `package.json` and both package-lock root versions to `0.18.0`.
          - Synchronizes all package-lock root metadata from `package.json`.
          - Finalizes the v0.18.0 changelog date and release record.
          - Contains no runtime or workflow changes.
          - Publishing starts only after this PR is approved, fully green, and merged.
          - The publisher rejects every version outside the locked `0.18.x` train; `0.19.0` remains blocked.

          After merge, `.github/workflows/release.yml` validates the exact squash commit, publishes npm with provenance, creates `v0.18.0` on that commit, and creates the matching GitHub Release.
          EOF
          PR_URL="$(gh pr create --base main --head "$RELEASE_BRANCH" --title "$RELEASE_TITLE" --body-file release-pr.md)"
          echo "url=$PR_URL" >> "$GITHUB_OUTPUT"
          gh pr edit "$PR_URL" --add-reviewer SoulWayy || echo "Reviewer request could not be added automatically; branch protection still requires external approval."
          gh pr comment "$PR_URL" --body "@coderabbitai review" || echo "CodeRabbit review trigger was not accepted; external approval remains mandatory."

      - name: Dispatch required checks for the bot-created PR
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh workflow run ci.yml --ref "$RELEASE_BRANCH"
          gh workflow run linter.yml --ref "$RELEASE_BRANCH"

      - name: Enable auto-merge after checks and external approval
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ steps.pr.outputs.url }}
        run: |
          set -euo pipefail
          gh pr merge "$PR_URL" --auto --squash \
            --subject "$RELEASE_TITLE" \
            --body "Prepared by the guarded v0.18.0 release workflow."
