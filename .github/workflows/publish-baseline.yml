name: Publish maintenance baseline

# Publishes an approved pre-train baseline already landed on main (e.g. 0.17.5).
# The locked 0.18 transactional publisher remains separate — see release.yml.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type the exact baseline version to publish (e.g. 0.17.5)"
        required: true
        type: string

permissions: {}

concurrency:
  group: npm-baseline-publish
  cancel-in-progress: false

jobs:
  verify:
    name: Verify and build baseline artifact
    if: github.ref == 'refs/heads/main' && inputs.confirm == '0.17.5'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve baseline version
        id: version
        env:
          CONFIRM_VERSION: ${{ inputs.confirm }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          test "$VERSION" = "$CONFIRM_VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.19
          package-manager-cache: false

      - name: Validate maintenance baseline policy
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          node scripts/release-policy.mjs baseline "$VERSION"

      - run: npm ci

      - name: Run release gate
        run: |
          npm run build
          npm run typecheck
          npm run lint
          npm test
          npm run verify:package

      - name: Pack immutable artifact
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          npm pack --ignore-scripts --json > release-pack.json
          node scripts/verify-npm-pack.mjs release-pack.json
          node scripts/write-release-manifest.mjs release-pack.json release-manifest.json
          echo "filename=$(node -p "require('./release-manifest.json').tarballFile")" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-baseline-${{ steps.version.outputs.version }}
          path: |
            ${{ steps.pack.outputs.filename }}
            release-manifest.json
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish baseline to npm
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_VERSION: ${{ needs.verify.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
          sparse-checkout: |
            scripts/release-recovery.mjs
            scripts/verify-published-package.mjs
          sparse-checkout-cone-mode: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-baseline-${{ needs.verify.outputs.version }}
          path: release-artifact
          # v8 defaults to `error` on digest mismatch, which would hard-fail
          # the publish flow on a single corrupted byte. Warn and continue so
          # transient registry/network drift doesn't block a release.
          digest-mismatch: warn

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.19
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Decide whether npm publish is required
        id: npm
        shell: bash
        run: |
          set -euo pipefail
          node scripts/release-recovery.mjs decide-publish "@onlinechefgroep/pi-agent-orchestrator" "$RELEASE_VERSION"

      - name: Publish tarball with provenance
        if: steps.npm.outputs.publish == 'true'
        shell: bash
        run: |
          set -euo pipefail
          TARBALL="$(node -p "require('./release-artifact/release-manifest.json').tarballFile")"
          npm publish "./release-artifact/${TARBALL}" --access public --provenance --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify published package
        shell: bash
        run: |
          set -euo pipefail
          node scripts/verify-published-package.mjs \
            --spec "@onlinechefgroep/pi-agent-orchestrator@$RELEASE_VERSION" \
            --expected release-artifact/release-manifest.json \
            --workdir published

  finalize:
    name: Tag and create GitHub Release
    needs: [verify, publish]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      RELEASE_VERSION: ${{ needs.verify.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Create or verify Git tag
        run: node scripts/ensure-release-tag.mjs "v$RELEASE_VERSION" "$GITHUB_SHA"

      - name: Create or verify GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/release-recovery.mjs ensure-github-release "v$RELEASE_VERSION" "v$RELEASE_VERSION"

      - name: Summary
        run: |
          {
            echo "## Published maintenance baseline v$RELEASE_VERSION"
            echo
            echo "- Source commit: \`$GITHUB_SHA\`"
            echo "- npm: \`@onlinechefgroep/pi-agent-orchestrator@$RELEASE_VERSION\`"
            echo "- 0.18.x transactional train remains locked."
          } >> "$GITHUB_STEP_SUMMARY"
