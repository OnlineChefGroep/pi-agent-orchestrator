name: Refine motion system v2

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/scripts/refine-motion-v2.py
      - .github/workflows/refine-motion-v2.yml

permissions:
  contents: write

jobs:
  refine-and-validate:
    if: github.head_ref == 'feat/motion-system-v2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/motion-system-v2
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply refinement
        run: python .github/scripts/refine-motion-v2.py

      - name: Install dependencies
        run: npm ci

      - name: Format changed files
        run: npx biome check --write src/ui/animation.ts src/ui/agent-widget.ts test/motion-profiles.test.ts test/animation-profiles.test.ts

      - name: Typecheck
        run: npm run typecheck

      - name: Check formatting and lint
        run: npx biome check src/ui/animation.ts src/ui/agent-widget.ts test/motion-profiles.test.ts test/animation-profiles.test.ts

      - name: Test semantic profiles
        run: npx vitest run test/motion-profiles.test.ts

      - name: Test frame width and animation profiles
        run: npx vitest run test/animation-profiles.test.ts

      - name: Test widget parity
        run: npx vitest run test/widget-motion-parity.test.ts

      - name: Commit refinement
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/scripts/refine-motion-v2.py
          git rm .github/workflows/refine-motion-v2.yml
          git add src test docs/motion-profiles.md
          git commit -m "fix(ui): harden semantic motion matching and cadence"
          git push origin HEAD:feat/motion-system-v2
