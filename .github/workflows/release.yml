name: Release

# Canonical npm publisher. The guarded prepare-release workflow creates a
# minimal reviewed release PR. This workflow verifies and packs that exact
# merged commit in a read-only job, publishes only the resulting artifact in an
# OIDC-scoped job, then grants Git write access only to the final tag/release
# job. Re-running a partially failed workflow is safe and does not republish.

on:
  push:
    branches: [main]
    paths:
      - CHANGELOG.md
      - package.json
      - package-lock.json

permissions: {}

concurrency:
  group: npm-release-production
  cancel-in-progress: false

jobs:
  detect:
    name: Detect reviewed release commit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_release: ${{ steps.release.outputs.should_release }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout release candidate
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Match the canonical release commit
        id: release
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          SUBJECT="$(git log -1 --pretty=%s)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ "$SUBJECT" != "chore(release): v$VERSION" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No release: main commit is not the canonical release transaction."
            exit 0
          fi
          node scripts/release-policy.mjs candidate "$VERSION"
          echo "should_release=true" >> "$GITHUB_OUTPUT"

  verify:
    name: Verify and build immutable npm artifact
    needs: detect
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
    env:
      RELEASE_VERSION: ${{ needs.detect.outputs.version }}
    steps:
      - name: Checkout exact merged release commit read-only
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.19
          package-manager-cache: false

      - name: Validate release transaction and source integrity
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REF" = "refs/heads/main"
          test "$(git log -1 --pretty=%s)" = "chore(release): v$RELEASE_VERSION"
          npm run verify:release-policy:publish
          node scripts/verify-release-transaction.mjs "$GITHUB_SHA^" "$GITHUB_SHA" "$RELEASE_VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Run complete immutable release gate once
        run: |
          npm run build
          npm run typecheck
          npm run lint
          npm test
          npm run verify:package

      - name: Pack and describe the reviewed artifact
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          npm pack --ignore-scripts --json > release-pack.json
          node scripts/verify-npm-pack.mjs release-pack.json
          node --input-type=module <<'NODE'
          import { readFile, writeFile } from "node:fs/promises";
          import { REQUIRED_PACKAGE_FILES } from "./scripts/package-resource-contract.mjs";

          const pkg = JSON.parse(await readFile("package.json", "utf8"));
          const [packed] = JSON.parse(await readFile("release-pack.json", "utf8"));
          if (!packed?.filename || !packed?.integrity) {
            throw new Error("npm pack did not return a filename and integrity");
          }
          const manifest = {
            package: {
              name: pkg.name,
              version: pkg.version,
              license: pkg.license,
              engines: pkg.engines,
              peerDependencies: pkg.peerDependencies,
              pi: pkg.pi,
            },
            requiredFiles: REQUIRED_PACKAGE_FILES,
            tarballFile: packed.filename,
            tarballIntegrity: packed.integrity,
          };
          await writeFile("release-manifest.json", `${JSON.stringify(manifest, null, 2)}\n`);
          NODE
          echo "filename=$(node -p "require('./release-manifest.json').tarballFile")" >> "$GITHUB_OUTPUT"

      - name: Upload immutable release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-release-${{ needs.detect.outputs.version }}
          path: |
            ${{ steps.pack.outputs.filename }}
            release-manifest.json
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish and verify npm registry artifact
    needs: [detect, verify]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_VERSION: ${{ needs.detect.outputs.version }}
    steps:
      - name: Download immutable release artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: npm-release-${{ needs.detect.outputs.version }}
          path: release-artifact

      - name: Setup npm registry authentication
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.19
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Determine whether npm publish is required
        id: npm
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE="@onlinechefgroep/pi-agent-orchestrator"
          # Exact version first. `npm view pkg version` only reads the `latest` tag
          # and would mis-classify recovery when latest points elsewhere.
          if npm view "$PACKAGE@$RELEASE_VERSION" version >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "npm already contains $PACKAGE@$RELEASE_VERSION; continuing recovery with registry/tag/release verification."
            exit 0
          fi
          LATEST="$(npm view "$PACKAGE" version)"
          HIGHEST="$(printf '%s\n%s\n' "$LATEST" "$RELEASE_VERSION" | sort -V | tail -n1)"
          if [ "$HIGHEST" != "$RELEASE_VERSION" ]; then
            echo "Refusing to publish $RELEASE_VERSION behind npm latest $LATEST." >&2
            exit 1
          fi
          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: Publish immutable tarball with provenance
        if: steps.npm.outputs.publish == 'true'
        shell: bash
        run: |
          set -euo pipefail
          TARBALL="$(node -p "require('./release-artifact/release-manifest.json').tarballFile")"
          npm publish "release-artifact/$TARBALL" --access public --provenance --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify npm metadata, integrity, and downloaded files
        shell: bash
        run: |
          set -euo pipefail
          SPEC="@onlinechefgroep/pi-agent-orchestrator@$RELEASE_VERSION"
          for attempt in 1 2 3 4 5 6; do
            if npm view "$SPEC" --json > published-metadata.json; then
              break
            fi
            test "$attempt" -lt 6 || exit 1
            sleep 5
          done
          mkdir published
          (cd published && npm pack "$SPEC" --ignore-scripts --json > ../published-pack.json)
          node <<'NODE'
          const fs = require("node:fs");
          const expected = JSON.parse(fs.readFileSync("release-artifact/release-manifest.json", "utf8"));
          const published = JSON.parse(fs.readFileSync("published-metadata.json", "utf8"));
          const [packed] = JSON.parse(fs.readFileSync("published-pack.json", "utf8"));

          const canonical = (value) => {
            if (Array.isArray(value)) return value.map(canonical);
            if (value && typeof value === "object") {
              return Object.fromEntries(Object.keys(value).sort().map((key) => [key, canonical(value[key])]));
            }
            return value;
          };
          const same = (left, right) => JSON.stringify(canonical(left)) === JSON.stringify(canonical(right));
          for (const field of ["name", "version", "license", "engines", "peerDependencies", "pi"]) {
            if (!same(published[field], expected.package[field])) {
              throw new Error(`Published ${field} does not match the reviewed artifact`);
            }
          }
          if (published.dist?.integrity !== expected.tarballIntegrity) {
            throw new Error("Registry dist.integrity does not match the reviewed tarball");
          }
          if (packed?.integrity !== expected.tarballIntegrity) {
            throw new Error("Downloaded tarball integrity does not match the reviewed tarball");
          }
          const files = new Set((packed.files ?? []).map((entry) => entry.path));
          const missing = expected.requiredFiles.filter((path) => !files.has(path));
          if (missing.length > 0) {
            throw new Error(`Published tarball is missing: ${missing.join(", ")}`);
          }
          NODE

  finalize:
    name: Tag exact source and create GitHub Release
    needs: [detect, publish]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      RELEASE_VERSION: ${{ needs.detect.outputs.version }}
    steps:
      - name: Checkout exact release source with tag credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Create or verify exact Git tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="v$RELEASE_VERSION"
          git fetch origin --tags
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            TAG_COMMIT="$(git rev-list -n1 "$TAG")"
            test "$TAG_COMMIT" = "$GITHUB_SHA" || {
              echo "$TAG points to $TAG_COMMIT instead of release commit $GITHUB_SHA" >&2
              exit 1
            }
            echo "$TAG already points to the correct commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" "$GITHUB_SHA" -m "$TAG"
            git push origin "refs/tags/$TAG"
          fi

      - name: Create or verify GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v${{ needs.detect.outputs.version }}
          EXPECTED_TITLE: v${{ needs.detect.outputs.version }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --json tagName,isDraft,isPrerelease,name > release-meta.json 2>/dev/null; then
            node --input-type=module <<'NODE'
            import { readFile } from "node:fs/promises";
            import { spawnSync } from "node:child_process";
            import { validateGitHubReleaseMetadata } from "./scripts/release-recovery.mjs";

            const release = JSON.parse(await readFile("release-meta.json", "utf8"));
            const tagName = process.env.TAG;
            const expected = { tagName, name: process.env.EXPECTED_TITLE };
            const result = validateGitHubReleaseMetadata(release, expected);
            if (result.repairs.length > 0) {
              const edited = spawnSync(
                "gh",
                ["release", "edit", tagName, "--draft=false", "--prerelease=false", "--title", expected.name],
                { encoding: "utf8" },
              );
              if (edited.status !== 0) {
                throw new Error(edited.stderr || edited.stdout || "gh release edit failed");
              }
              console.log(`Repaired GitHub Release ${tagName} metadata: ${result.repairs.join(", ")}`);
            } else {
              console.log(`GitHub Release ${tagName} already exists with correct metadata.`);
            }
            NODE
          else
            gh release create "$TAG" --verify-tag --generate-notes --title "$EXPECTED_TITLE"
          fi

      - name: Publish release summary
        run: |
          {
            echo "## Released v$RELEASE_VERSION"
            echo
            echo "- Source commit: \`$GITHUB_SHA\`"
            echo "- npm: \`@onlinechefgroep/pi-agent-orchestrator@$RELEASE_VERSION\`"
            echo "- Registry metadata and downloaded tarball: verified"
            echo "- Tag: \`v$RELEASE_VERSION\`"
            echo "- Release train remains locked to \`0.18.x\`; \`0.19.0\` is blocked by policy."
          } >> "$GITHUB_STEP_SUMMARY"
