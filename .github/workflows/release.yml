name: Release

# Canonical npm publisher. This workflow never invents a version and never
# publishes from an unreviewed branch or a floating tag. The guarded
# prepare-release.yml workflow creates a minimal release PR. After that PR is
# approved and squash-merged, this workflow publishes and tags that exact main
# commit. Re-running a partially failed job is safe and does not republish.

on:
  push:
    branches: [main]
    paths:
      - CHANGELOG.md
      - package.json
      - package-lock.json

permissions:
  contents: write
  id-token: write

concurrency:
  group: npm-release-production
  cancel-in-progress: false

jobs:
  detect:
    name: Detect reviewed release commit
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.release.outputs.should_release }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout release candidate
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Match the canonical release commit
        id: release
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          SUBJECT="$(git log -1 --pretty=%s)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ "$SUBJECT" != "chore(release): v$VERSION" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No release: main commit is not the canonical release transaction."
            exit 0
          fi
          node scripts/release-policy.mjs candidate "$VERSION"
          echo "should_release=true" >> "$GITHUB_OUTPUT"

  release:
    name: Publish, tag, and create GitHub Release
    needs: detect
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      RELEASE_VERSION: ${{ needs.detect.outputs.version }}
    steps:
      - name: Checkout exact merged release commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.19
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Validate release transaction and source integrity
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REF" = "refs/heads/main"
          test "$(git log -1 --pretty=%s)" = "chore(release): v$RELEASE_VERSION"
          npm run verify:release-policy
          node scripts/release-policy.mjs candidate "$RELEASE_VERSION"
          node scripts/verify-release-transaction.mjs "$GITHUB_SHA^" "$GITHUB_SHA" "$RELEASE_VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Run complete immutable release gate
        run: |
          npm run build
          npm run typecheck
          npm run lint
          npm test
          npm run verify:package
          npm pack --dry-run --json > npm-pack.json
          node scripts/verify-npm-pack.mjs npm-pack.json

      - name: Determine whether npm publish is required
        id: npm
        shell: bash
        run: |
          set -euo pipefail
          PUBLISHED="$(npm view @onlinechefgroep/pi-agent-orchestrator version)"
          if [ "$PUBLISHED" = "$RELEASE_VERSION" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "npm already contains $RELEASE_VERSION; continuing recovery with tag/release verification."
            exit 0
          fi
          HIGHEST="$(printf '%s\n%s\n' "$PUBLISHED" "$RELEASE_VERSION" | sort -V | tail -n1)"
          if [ "$HIGHEST" != "$RELEASE_VERSION" ]; then
            echo "Refusing to publish $RELEASE_VERSION behind npm version $PUBLISHED." >&2
            exit 1
          fi
          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: Publish to npmjs.org with provenance
        if: steps.npm.outputs.publish == 'true'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create or verify exact Git tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="v$RELEASE_VERSION"
          git fetch origin --tags
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            TAG_COMMIT="$(git rev-list -n1 "$TAG")"
            test "$TAG_COMMIT" = "$GITHUB_SHA" || {
              echo "$TAG points to $TAG_COMMIT instead of release commit $GITHUB_SHA" >&2
              exit 1
            }
            echo "$TAG already points to the correct commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" "$GITHUB_SHA" -m "$TAG"
            git push origin "refs/tags/$TAG"
          fi

      - name: Create or verify GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="v$RELEASE_VERSION"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub Release $TAG already exists."
          else
            gh release create "$TAG" --verify-tag --generate-notes --title "$TAG"
          fi

      - name: Publish release summary
        run: |
          {
            echo "## Released v$RELEASE_VERSION"
            echo
            echo "- Source commit: \`$GITHUB_SHA\`"
            echo "- npm: \`@onlinechefgroep/pi-agent-orchestrator@$RELEASE_VERSION\`"
            echo "- Tag: \`v$RELEASE_VERSION\`"
            echo "- Release train remains locked to \`0.18.x\`; \`0.19.0\` is blocked by policy."
          } >> "$GITHUB_STEP_SUMMARY"
