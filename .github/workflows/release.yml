name: Release

# Canonical npm publisher. The guarded prepare-release workflow creates a
# minimal reviewed release PR. This workflow verifies and packs that exact
# merged commit in a read-only job, publishes only the resulting artifact in an
# OIDC-scoped job, then grants Git write access only to the final tag/release
# job. Re-running a partially failed workflow is safe and does not republish.
#
# Release decisions live in tested scripts under scripts/*.mjs. Workflow steps
# only orchestrate those scripts — no inline npm/gh decision heredocs.

on:
  push:
    branches: [main]
    paths:
      - CHANGELOG.md
      - package.json
      - package-lock.json

permissions: {}

concurrency:
  group: npm-release-production
  cancel-in-progress: false

jobs:
  detect:
    name: Detect reviewed release commit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_release: ${{ steps.release.outputs.should_release }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout release candidate
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Match the canonical release commit
        id: release
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          SUBJECT="$(git log -1 --pretty=%s)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ "$SUBJECT" != "chore(release): v$VERSION" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No release: main commit is not the canonical release transaction."
            exit 0
          fi
          node scripts/release-policy.mjs candidate "$VERSION"
          echo "should_release=true" >> "$GITHUB_OUTPUT"

  verify:
    name: Verify and build immutable npm artifact
    needs: detect
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
    env:
      RELEASE_VERSION: ${{ needs.detect.outputs.version }}
    steps:
      - name: Checkout exact merged release commit read-only
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.19
          package-manager-cache: false

      - name: Validate release transaction and source integrity
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REF" = "refs/heads/main"
          test "$(git log -1 --pretty=%s)" = "chore(release): v$RELEASE_VERSION"
          npm run verify:release-policy:publish
          node scripts/verify-release-transaction.mjs "$GITHUB_SHA^" "$GITHUB_SHA" "$RELEASE_VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Run complete immutable release gate once
        run: |
          npm run build
          npm run typecheck
          npm run lint
          npm test
          npm run verify:package

      - name: Pack and describe the reviewed artifact
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          npm pack --ignore-scripts --json > release-pack.json
          node scripts/verify-npm-pack.mjs release-pack.json
          node scripts/write-release-manifest.mjs release-pack.json release-manifest.json
          echo "filename=$(node -p "require('./release-manifest.json').tarballFile")" >> "$GITHUB_OUTPUT"

      - name: Upload immutable release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-release-${{ needs.detect.outputs.version }}
          path: |
            ${{ steps.pack.outputs.filename }}
            release-manifest.json
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish and verify npm registry artifact
    needs: [detect, verify]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_VERSION: ${{ needs.detect.outputs.version }}
    steps:
      - name: Checkout release helpers read-only
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
          sparse-checkout: |
            scripts/release-recovery.mjs
            scripts/verify-published-package.mjs
          sparse-checkout-cone-mode: false

      - name: Download immutable release artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: npm-release-${{ needs.detect.outputs.version }}
          path: release-artifact

      - name: Setup npm registry authentication
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.19
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Determine whether npm publish is required
        id: npm
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE="@onlinechefgroep/pi-agent-orchestrator"
          node scripts/release-recovery.mjs decide-publish "$PACKAGE" "$RELEASE_VERSION"

      - name: Publish immutable tarball with provenance
        if: steps.npm.outputs.publish == 'true'
        shell: bash
        run: |
          set -euo pipefail
          TARBALL="$(node -p "require('./release-artifact/release-manifest.json').tarballFile")"
          npm publish "./release-artifact/${TARBALL}" --access public --provenance --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify npm metadata, integrity, and downloaded files
        shell: bash
        run: |
          set -euo pipefail
          SPEC="@onlinechefgroep/pi-agent-orchestrator@$RELEASE_VERSION"
          node scripts/verify-published-package.mjs \
            --spec "$SPEC" \
            --expected release-artifact/release-manifest.json \
            --workdir published

  finalize:
    name: Tag exact source and create GitHub Release
    needs: [detect, publish]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      RELEASE_VERSION: ${{ needs.detect.outputs.version }}
    steps:
      - name: Checkout exact release source with tag credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Create or verify exact Git tag
        shell: bash
        run: |
          set -euo pipefail
          node scripts/ensure-release-tag.mjs "v$RELEASE_VERSION" "$GITHUB_SHA"

      - name: Create or verify GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="v$RELEASE_VERSION"
          node scripts/release-recovery.mjs ensure-github-release "$TAG" "$TAG"

      - name: Publish release summary
        run: |
          {
            echo "## Released v$RELEASE_VERSION"
            echo
            echo "- Source commit: \`$GITHUB_SHA\`"
            echo "- npm: \`@onlinechefgroep/pi-agent-orchestrator@$RELEASE_VERSION\`"
            echo "- Registry metadata and downloaded tarball: verified"
            echo "- Tag: \`v$RELEASE_VERSION\`"
            echo "- Release train remains locked to \`0.18.x\`; \`0.19.0\` is blocked by policy."
          } >> "$GITHUB_STEP_SUMMARY"
