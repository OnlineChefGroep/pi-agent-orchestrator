---
name: Remotion Showcase

on:
  pull_request:
    branches: [main]
    paths:
      - 'showcase/remotion/**'
      - 'scripts/render-showcase-remotion.sh'
      - 'scripts/verify-product-film.mjs'
      - 'scripts/showcase-live-demo.mjs'
      - 'scripts/build-site.sh'
      - 'site/web/index.html'
      - 'site/web/package.json'
      - 'site/web/package-lock.json'
      - 'site/web/public/_headers'
      - 'site/web/scripts/stage-public.mjs'
      - 'site/web/src/lib/content.ts'
      - 'site/web/test/site-smoke.test.ts'
      - 'src/ui/**'
      - 'README.md'
      - 'AGENTS.md'
      - 'agent-permissions.json'
      - 'llms.txt'
      - 'llms-full.txt'
      - 'sitemap.md'
      - 'docs/architecture.md'
      - 'docs/prompt-compression.md'
      - 'docs/site-hosting.md'
      - 'package.json'
      - '.github/workflows/remotion-showcase.yml'
  workflow_dispatch:

permissions: { }

concurrency:
  group: remotion-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  render:
    name: Render promo media
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.19
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Verify committed promo data
        run: npm --prefix showcase/remotion run promo:data:check

      - name: Verify committed terminal showcase data
        run: npm --prefix showcase/remotion run showcase:data:check

      # TODO: committed docs/images/dashboard_preview.{mp4,gif} may still be the short
      # programmatic fallback until a full Remotion hero re-render is published from CI
      # artifacts (or a deterministic local render). Site/README copy already describes
      # the committed media; do not claim Remotion chrome for that hero until replaced.
      - name: Render showcase suite
        shell: bash
        run: |
          set -o pipefail
          bash scripts/render-showcase-remotion.sh 2>&1 |
            tee remotion-render.log

      - name: Verify product film contract
        run: >-
          node scripts/verify-product-film.mjs
          docs/images/product_film.mp4

      - name: Install site dependencies
        run: npm ci --prefix site/web

      - name: Verify site integration
        shell: bash
        run: |
          set -euo pipefail
          npm --prefix site/web run lint
          npm --prefix site/web test
          npm --prefix site/web run build

          for file in \
            llms.txt \
            llms-full.txt \
            sitemap.md \
            AGENTS.md \
            agent-permissions.json \
            .well-known/agent-permissions.json \
            _headers; do
            test -s "site/web/dist/$file"
          done

          cmp -s \
            site/web/dist/agent-permissions.json \
            site/web/dist/.well-known/agent-permissions.json
          grep -q '^# Pi Agent Orchestrator' site/web/dist/llms.txt
          grep -q 'Content-Type: text/plain; charset=utf-8' site/web/dist/_headers
          node -e 'const fs=require("node:fs");const p=JSON.parse(fs.readFileSync("site/web/dist/agent-permissions.json","utf8"));if(p.metadata?.schema_version!=="1.0.0"||p.strict!==true||!Array.isArray(p.resource_rules))process.exit(1)'

      - name: Upload rendered assets and log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: remotion-showcase-${{ github.sha }}
          path: |
            remotion-render.log
            docs/images/dashboard_preview.mp4
            docs/images/dashboard_preview.png
            docs/images/promo_banner.png
            docs/images/social_preview.png
            docs/images/architecture_overview.png
            docs/images/product_film.mp4
            docs/images/feature_tour.mp4
          if-no-files-found: error
          retention-days: 14
