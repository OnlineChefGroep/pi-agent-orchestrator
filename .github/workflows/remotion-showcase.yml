name: Remotion Showcase

on:
  pull_request:
    branches: [main]
    paths:
      - 'showcase/remotion/**'
      - 'scripts/render-showcase-remotion.sh'
      - 'scripts/showcase-live-demo.mjs'
      - 'src/ui/**'
      - 'README.md'
      - 'docs/architecture.md'
      - 'docs/prompt-compression.md'
      - 'package.json'
      - '.github/workflows/remotion-showcase.yml'
  workflow_dispatch:

permissions: {}

concurrency:
  group: remotion-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  render:
    name: Render promo media
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.19
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Verify committed promo data
        run: npm --prefix showcase/remotion run promo:data:check

      - name: Render showcase suite
        shell: bash
        run: |
          set -o pipefail
          bash scripts/render-showcase-remotion.sh 2>&1 | tee remotion-render.log

      - name: Upload rendered assets and log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: remotion-showcase-${{ github.sha }}
          path: |
            remotion-render.log
            docs/images/dashboard_preview.mp4
            docs/images/dashboard_preview.png
            docs/images/promo_banner.png
            docs/images/social_preview.png
            docs/images/architecture_overview.png
            docs/images/product_film.mp4
            docs/images/feature_tour.mp4
          if-no-files-found: error
          retention-days: 14
